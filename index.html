<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>КЛИКАЙ</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

#counter {
  position: absolute;
  top: 20px;
  font-size: 30px;
}

.container {
  position: relative;
}

img {
  width: 300px;
  transition: transform 0.1s;
  cursor: pointer;
}

img:active {
  transform: scale(0.9);
}

/* стрелки */
.arrow {
  position: absolute;
  color: red;
  font-size: 40px;
  animation: pulse 1s infinite;
}

.arrow.top { top: -50px; left: 50%; transform: translateX(-50%); }
.arrow.bottom { bottom: -50px; left: 50%; transform: translateX(-50%); }
.arrow.left { left: -50px; top: 50%; transform: translateY(-50%); }
.arrow.right { right: -50px; top: 50%; transform: translateY(-50%); }

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.6; }
  100% { transform: scale(1); opacity: 1; }
}

/* победа */
#winText {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 60px;
  color: red;
  display: none;
  text-align: center;
}

/* тряска */
.shake {
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(5px,-5px); }
  50% { transform: translate(-5px,5px); }
  75% { transform: translate(5px,5px); }
  100% { transform: translate(-5px,-5px); }
}

</style>
</head>

<body>

<div id="counter">Клики: 0</div>

<div class="container">
  <div class="arrow top">⬇</div>
  <div class="arrow bottom">⬆</div>
  <div class="arrow left">➡</div>
  <div class="arrow right">⬅</div>

  <img id="img" src="onego.jpg.png">
</div>

<div id="winText">ТЫ ПОБЕДИЛ</div>

<script>
let count = 0;
const counter = document.getElementById("counter");
const img = document.getElementById("img");
const winText = document.getElementById("winText");

img.addEventListener("click", () => {
  count++;
  counter.textContent = "Клики: " + count;

  // эффект нажатия
  img.style.transform = "scale(0.9)";
  setTimeout(() => {
    img.style.transform = "scale(1)";
  }, 100);

  // победа
  if (count >= 1000) {
    winText.style.display = "block";
    img.classList.add("shake");
  }
});
</script>

</body>
</html>
